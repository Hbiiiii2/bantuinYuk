openapi: 3.0.3
info:
  title: BantuinYuk API
  description: |
    Marketplace outsourcing task platform API.
    
    ## Roles
    - **User**: Creates tasks, releases payments, leaves reviews
    - **Helper**: Accepts and completes tasks, receives payments
    - **Admin**: Manages users, helpers, disputes, and monitors system
    
    ## Authentication
    All protected endpoints require Bearer Token authentication.
    
    ## Rate Limiting
    - Login: 10 requests per minute
    
    ## Pagination
    All list endpoints support pagination with `page` and `per_page` query parameters.
  version: 1.0.0
  contact:
    name: BantuinYuk Support
    email: support@bantuinyuk.com
  
servers:
  - url: http://bantuinYuk.test/api/v1
    description: Local Development Server

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Access token from login endpoint"
  
  schemas:
    # ============ COMMON SCHEMAS ============
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Success
        data:
          type: object
    
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        errors:
          type: object
    
    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        per_page:
          type: integer
    
    # ============ AUTH SCHEMAS ============
    RegisterRequest:
      type: object
      required: [name, email, phone, password]
      properties:
        name:
          type: string
          example: John Doe
        email:
          type: string
          format: email
          example: john@example.com
        phone:
          type: string
          example: "081234567890"
        password:
          type: string
          format: password
          example: password123
    
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          format: password
          example: password123
    
    LoginResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        token:
          type: object
          properties:
            access_token:
              type: string
            type:
              type: string
              example: Bearer
            expires_in:
              type: integer
              example: 2592000
    
    # ============ USER SCHEMAS ============
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        role:
          type: string
          enum: [user, helper, admin]
        photo:
          type: string
          nullable: true
        rating:
          type: number
          format: float
        created_at:
          type: string
          format: date-time
    
    UserProfile:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          properties:
            stats:
              type: object
              properties:
                total_tasks:
                  type: integer
                completed_tasks:
                  type: integer
    
    # ============ TASK SCHEMAS ============
    Task:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        helper_id:
          type: integer
          nullable: true
        category_id:
          type: integer
        title:
          type: string
        description:
          type: string
        price:
          type: number
          format: float
        location:
          type: string
          nullable: true
        deadline_start:
          type: string
          format: date-time
        deadline_end:
          type: string
          format: date-time
        status:
          type: string
          enum: [draft, open, accepted, in_progress, waiting_approval, completed, cancelled]
        category_name:
          type: string
        user_name:
          type: string
        helper_name:
          type: string
          nullable: true
        status_history:
          type: array
          items:
            $ref: '#/components/schemas/StatusHistory'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    
    TaskCreateRequest:
      type: object
      required: [title, description, price, category_id, deadline_start, deadline_end]
      properties:
        title:
          type: string
          minLength: 5
          maxLength: 255
          example: Butuh tukang bangunan
        description:
          type: string
          example: Butuh tukang bangunan untuk renovasi kamar mandi
        price:
          type: number
          example: 500000
        category_id:
          type: integer
          example: 1
        deadline_start:
          type: string
          format: date-time
          example: "2026-06-20 08:00:00"
        deadline_end:
          type: string
          format: date-time
          example: "2026-06-25 17:00:00"
        location:
          type: string
          example: Jl. Sudirman No. 123
    
    StatusHistory:
      type: object
      properties:
        id:
          type: integer
        task_id:
          type: integer
        status:
          type: string
        note:
          type: string
          nullable: true
        created_by:
          type: integer
        created_by_name:
          type: string
        created_at:
          type: string
          format: date-time
    
    # ============ HELPER SCHEMAS ============
    HelperProfile:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        bio:
          type: string
        skills:
          type: string
        ktp_number:
          type: string
        verification_status:
          type: string
          enum: [pending, verified, rejected]
        completed_tasks:
          type: integer
        created_at:
          type: string
          format: date-time
    
    HelperList:
      allOf:
        - $ref: '#/components/schemas/HelperProfile'
        - type: object
          properties:
            name:
              type: string
            email:
              type: string
            phone:
              type: string
            rating:
              type: number
    
    Location:
      type: object
      properties:
        id:
          type: integer
        helper_id:
          type: integer
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        updated_at:
          type: string
          format: date-time
    
    # ============ ATTACHMENT SCHEMAS ============
    TaskAttachment:
      type: object
      properties:
        id:
          type: integer
        task_id:
          type: integer
        user_id:
          type: integer
        file_name:
          type: string
        file_path:
          type: string
        file_type:
          type: string
        file_size:
          type: integer
        created_at:
          type: string
          format: date-time
    
    # ============ PROGRESS SCHEMAS ============
    TaskProgress:
      type: object
      properties:
        id:
          type: integer
        task_id:
          type: integer
        helper_id:
          type: integer
        helper_name:
          type: string
        description:
          type: string
        attachment:
          type: string
          nullable: true
        attachment_ids:
          type: array
          items:
            type: integer
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/TaskAttachment'
        status:
          type: string
          enum: [active, deleted]
        created_at:
          type: string
          format: date-time
    
    # ============ REVIEW SCHEMAS ============
    Review:
      type: object
      properties:
        id:
          type: integer
        task_id:
          type: integer
        user_id:
          type: integer
        helper_id:
          type: integer
        rating:
          type: integer
          minimum: 1
          maximum: 5
        review:
          type: string
          nullable: true
        user_name:
          type: string
        task_title:
          type: string
        created_at:
          type: string
          format: date-time
    
    ReviewCreateRequest:
      type: object
      required: [rating]
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
          example: 5
        review:
          type: string
          example: Helper sangat profesional!
    
    RatingSummary:
      type: object
      properties:
        average_rating:
          type: number
          format: float
        total_reviews:
          type: integer
        completed_tasks:
          type: integer
        distribution:
          type: object
          properties:
            "1":
              type: integer
            "2":
              type: integer
            "3":
              type: integer
            "4":
              type: integer
            "5":
              type: integer
    
    # ============ WALLET SCHEMAS ============
    Wallet:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        balance:
          type: number
          format: float
        pending_balance:
          type: number
          format: float
        created_at:
          type: string
          format: date-time
    
    WalletSummary:
      type: object
      properties:
        balance:
          type: number
          format: float
        available_balance:
          type: number
          format: float
        pending_balance:
          type: number
          format: float
        total_earned:
          type: number
          format: float
        total_withdrawn:
          type: number
          format: float
        total_refunded:
          type: number
          format: float
        pending_withdrawals:
          type: number
          format: float
    
    # ============ TRANSACTION SCHEMAS ============
    Transaction:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        task_id:
          type: integer
          nullable: true
        amount:
          type: number
          format: float
        type:
          type: string
          enum: [task_payment, withdraw, refund, adjustment]
        status:
          type: string
          enum: [pending, completed, failed, cancelled]
        reference_id:
          type: string
        description:
          type: string
          nullable: true
        user_name:
          type: string
        created_at:
          type: string
          format: date-time
    
    WithdrawRequest:
      type: object
      required: [amount]
      properties:
        amount:
          type: number
          example: 200000
        description:
          type: string
          example: Withdraw for June
    
    # ============ NOTIFICATION SCHEMAS ============
    Notification:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        type:
          type: string
          enum: [task_created, task_accepted, task_started, task_progress, task_submitted, task_completed, task_cancelled, review_received, payment_released, withdraw_requested, withdraw_approved, withdraw_rejected, dispute_created, dispute_under_review, dispute_resolved, dispute_rejected]
        title:
          type: string
        message:
          type: string
        data:
          type: string
          nullable: true
        is_read:
          type: integer
          enum: [0, 1]
        created_at:
          type: string
          format: date-time
    
    NotificationList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
        total:
          type: integer
        page:
          type: integer
        per_page:
          type: integer
        unread_count:
          type: integer
    
    # ============ DISPUTE SCHEMAS ============
    Dispute:
      type: object
      properties:
        id:
          type: integer
        task_id:
          type: integer
        user_id:
          type: integer
        helper_id:
          type: integer
          nullable: true
        reason:
          type: string
        evidence_file:
          type: string
          nullable: true
        admin_note:
          type: string
          nullable: true
        status:
          type: string
          enum: [open, under_review, resolved, rejected]
        resolved_by:
          type: integer
          nullable: true
        resolved_at:
          type: string
          format: date-time
          nullable: true
        task_title:
          type: string
        creator_name:
          type: string
        helper_name:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
    
    DisputeCreateRequest:
      type: object
      required: [task_id, reason, description]
      properties:
        task_id:
          type: integer
        reason:
          type: string
          example: Work quality issue
        description:
          type: string
          example: The work does not meet standards...
    
    DisputeResolveRequest:
      type: object
      required: [resolution]
      properties:
        resolution:
          type: string
          example: Helper must redo the work
    
    # ============ ADMIN SCHEMAS ============
    DashboardSummary:
      type: object
      properties:
        users:
          type: integer
        helpers:
          type: integer
        tasks:
          type: integer
        open_tasks:
          type: integer
        completed_tasks:
          type: integer
        wallet_transactions:
          type: integer
        disputes:
          type: integer
        pending_disputes:
          type: integer
        notifications:
          type: integer
    
    Analytics:
      type: object
      properties:
        total_users:
          type: integer
        total_helpers:
          type: integer
        verified_helpers:
          type: integer
        total_tasks:
          type: integer
        completed_tasks:
          type: integer
        completion_rate:
          type: number
          format: float
        total_disputes:
          type: integer
        resolved_disputes:
          type: integer
        dispute_rate:
          type: number
          format: float
        total_transaction_amount:
          type: number
          format: float

paths:
  # ============ AUTH ENDPOINTS ============
  /auth/register:
    post:
      tags: [Auth]
      summary: Register new user
      description: Register a new user account.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user_id:
                            type: integer
                          name:
                            type: string
                          email:
                            type: string
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  
  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      description: Login with email and password. Returns access token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  
  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      description: Invalidate current access token.
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  
  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user
      description: Get authenticated user profile.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  
  # ============ TASK ENDPOINTS ============
  /tasks:
    get:
      tags: [Task]
      summary: List tasks
      description: Get all tasks with pagination, search, and filters.
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, open, accepted, in_progress, waiting_approval, completed, cancelled]
        - name: category_id
          in: query
          schema:
            type: integer
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [created_at, price, deadline_end, status]
        - name: sort_order
          in: query
          schema:
            type: string
            enum: [ASC, DESC]
            default: DESC
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        allOf:
                          - type: object
                            properties:
                              data:
                                type: array
                                items:
                                  $ref: '#/components/schemas/Task'
                          - $ref: '#/components/schemas/PaginationMeta'
    post:
      tags: [Task]
      summary: Create task
      description: Create a new task. User role only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCreateRequest'
      responses:
        '201':
          description: Task created successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Task'
        '403':
          description: Only users can create tasks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  
  /tasks/my:
    get:
      tags: [Task]
      summary: List my tasks
      description: Get tasks owned by current user.
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
        - name: date_from
          in: query
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          data:
                            type: array
                            items:
                              $ref: '#/components/schemas/Task'
                          total:
                            type: integer
                          page:
                            type: integer
                          per_page:
                            type: integer
  
  /tasks/{id}:
    get:
      tags: [Task]
      summary: Get task detail
      description: Get task detail by ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Task'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [Task]
      summary: Update task
      description: Update task details. Owner only.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                price:
                  type: number
                location:
                  type: string
      responses:
        '200':
          description: Task updated successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Task'
        '403':
          description: You can only update your own tasks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Task]
      summary: Cancel task
      description: Cancel a task. Owner only.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Task cancelled successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '403':
          description: You can only cancel your own tasks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  
  /tasks/{id}/complete:
    post:
      tags: [Task]
      summary: Complete task
      description: Mark task as completed. Owner only.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Task completed successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/Task'
        '403':
          description: Only task owner can complete the task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  
  # ============ HELPER ENDPOINTS ============
  /helpers:
    get:
      tags: [Helper]
      summary: List helpers
      description: Get all helpers with pagination.
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
        - name: verification_status
          in: query
          schema:
            type: string
            enum: [pending, verified, rejected]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          data:
                            type: array
                            items:
                              $ref: '#/components/schemas/HelperList'
                          total:
                            type: integer
                          page:
                            type: integer
                          per_page:
                            type: integer
  
  /helpers/{id}:
    get:
      tags: [Helper]
      summary: Get helper detail
      description: Get helper profile detail.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/HelperProfile'
        '404':
          description: Helper not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  
  /helpers/profile:
    get:
      tags: [Helper]
      summary: Get my profile
      description: Get current helper's profile.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/HelperProfile'
    put:
      tags: [Helper]
      summary: Update profile
      description: Update helper's own profile.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                bio:
                  type: string
                skills:
                  type: string
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              schema:
                allOf:
